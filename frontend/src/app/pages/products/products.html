<div class="header-container">
  <h1>Gestión de Inventario</h1>
  <button mat-raised-button color="primary" (click)="openProductForm()">
    <mat-icon>add</mat-icon> Nuevo Producto
  </button>
</div>

<!-- Buscador y Filtros -->
<div class="search-filter-container">
  <!-- Búsqueda por nombre -->
  <mat-form-field appearance="outline" class="search-field">
    <mat-label>Buscar por nombre</mat-label>
    <input 
      matInput 
      [formControl]="searchControl"
      placeholder="Escribe el nombre del producto">
    <button 
      mat-icon-button 
      matSuffix 
      *ngIf="searchControl.value"
      (click)="searchControl.reset('')"
      aria-label="Limpiar búsqueda">
      <mat-icon>close</mat-icon>
    </button>
  </mat-form-field>

  <!-- Filtro por categoría -->
  <mat-form-field appearance="outline" class="category-field">
    <mat-label>Categoría</mat-label>
    <mat-select [formControl]="categoryControl">
      <mat-option [value]="null">Todas las categorías</mat-option>
      <mat-option *ngFor="let category of categories()" [value]="category">
        {{category}}
      </mat-option>
    </mat-select>
  </mat-form-field>

  <!-- Botón para limpiar filtros -->
  <button 
    mat-stroked-button 
    (click)="clearFilters()"
    *ngIf="hasActiveFilters()">
    <mat-icon>clear_all</mat-icon> Limpiar Filtros
  </button>
</div>

<!-- Tabla de productos -->
<table mat-table [dataSource]="filteredProducts()" class="mat-elevation-z8">

  <!-- Columna ID -->
  <ng-container matColumnDef="id">
    <th mat-header-cell *matHeaderCellDef> ID </th>
    <td mat-cell *matCellDef="let product"> {{product.id}} </td>
  </ng-container>

  <!-- Columna Nombre -->
  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef> Producto </th>
    <td mat-cell *matCellDef="let product"> {{product.name}} </td>
  </ng-container>

  <!-- Columna Categoría -->
  <ng-container matColumnDef="category">
    <th mat-header-cell *matHeaderCellDef> Categoría </th>
    <td mat-cell *matCellDef="let product"> 
        <span class="badge">{{product.category}}</span> 
    </td>
  </ng-container>

  <!-- Columna Precio -->
  <ng-container matColumnDef="price">
    <th mat-header-cell *matHeaderCellDef> Precio </th>
    <td mat-cell *matCellDef="let product"> {{product.price | currency}} </td>
  </ng-container>

  <!-- Columna Stock -->
  <ng-container matColumnDef="stockQuantity">
    <th mat-header-cell *matHeaderCellDef> Stock </th>
    <td mat-cell *matCellDef="let product"> {{product.stockQuantity || product.stock}} u. </td>
  </ng-container>

  <!-- Columna Acciones -->
  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef>Acciones</th>
    <td mat-cell *matCellDef="let product">
      <button mat-icon-button (click)="editProduct(product)" matTooltip="Editar">
        <mat-icon>edit</mat-icon>
      </button>
      <button mat-icon-button (click)="deleteProduct(product.id)" matTooltip="Eliminar">
        <mat-icon>delete</mat-icon>
      </button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let product; columns: displayedColumns;"></tr>
</table>
