<div mat-dialog-content>
  <form [formGroup]="productForm" *ngIf="productForm">
    
    <!-- Campo Nombre -->
    <mat-form-field appearance="outline" class="w-full">
      <mat-label>Nombre del Producto</mat-label>
      <input matInput formControlName="name" placeholder="Ingrese el nombre">
      <mat-error *ngIf="productForm.get('name')?.hasError('required')">
        El nombre es requerido
      </mat-error>
      <mat-error *ngIf="productForm.get('name')?.hasError('minlength')">
        Mínimo 3 caracteres
      </mat-error>
    </mat-form-field>

    <!-- Campo Categoría -->
    <mat-form-field appearance="outline" class="w-full">
      <mat-label>Categoría</mat-label>
      <input matInput formControlName="category" placeholder="Ej: Electrónica, Ropa">
      <mat-error *ngIf="productForm.get('category')?.hasError('required')">
        La categoría es requerida
      </mat-error>
    </mat-form-field>

    <!-- Campo Precio -->
    <mat-form-field appearance="outline" class="w-full">
      <mat-label>Precio</mat-label>
      <input matInput type="number" formControlName="price" placeholder="0.00">
      <mat-error *ngIf="productForm.get('price')?.hasError('required')">
        El precio es requerido
      </mat-error>
      <mat-error *ngIf="productForm.get('price')?.hasError('min')">
        El precio debe ser mayor a 0
      </mat-error>
    </mat-form-field>

    <!-- Campo Stock -->
    <mat-form-field appearance="outline" class="w-full">
      <mat-label>Stock</mat-label>
      <input matInput type="number" formControlName="stock" placeholder="0">
      <mat-error *ngIf="productForm.get('stock')?.hasError('required')">
        El stock es requerido
      </mat-error>
      <mat-error *ngIf="productForm.get('stock')?.hasError('min')">
        El stock no puede ser negativo
      </mat-error>
    </mat-form-field>

    <!-- Campo Descripción -->
    <mat-form-field appearance="outline" class="w-full">
      <mat-label>Descripción</mat-label>
      <textarea matInput formControlName="description" placeholder="Descripción del producto" rows="3"></textarea>
    </mat-form-field>

  </form>
</div>

<div mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancelar</button>
  <button mat-raised-button color="primary" (click)="save()" [disabled]="!productForm?.valid">
    Guardar
  </button>
</div>
